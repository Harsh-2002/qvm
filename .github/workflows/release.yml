name: release

# Manual release workflow. Run from the Actions tab → "release" →
# "Run workflow". Cuts a calendar-versioned (YYYY.M.D) release that
# REPLACES any prior release — qvm's policy is "only ever one active
# release at a time" (see CLAUDE.md § Release policy).
#
# What it does:
#   1. Computes today's CalVer (UTC) and bakes it into Cargo.toml so
#      `qvm --version` reports the release version exactly.
#   2. Builds static-musl binaries for amd64 and arm64.
#   3. Deletes every prior GitHub Release and its tag.
#   4. Creates a fresh `vYYYY.M.D` release with both binaries attached.

on:
  workflow_dispatch:
    inputs:
      notes:
        description: "Optional release notes (markdown). Appended below the install snippet."
        required: false
        type: string

permissions:
  contents: write    # gh release create / delete + git tag push

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute calendar version
        id: ver
        # CalVer: YYYY.M.D (no leading zeros — SemVer-clean, Cargo
        # accepts it directly). Tag is `vYYYY.M.D`.
        run: |
          V="$(date -u +%Y.%-m.%-d)"
          echo "version=$V"   >> "$GITHUB_OUTPUT"
          echo "tag=v$V"      >> "$GITHUB_OUTPUT"
          echo "Releasing qvm $V"

      - name: Bake version into Cargo.toml
        # Cargo.lock's root-package entry is auto-regenerated by the
        # next `cargo build` (no --locked flag), so we don't need to
        # `cargo update` here.
        run: |
          set -e
          sed -i 's/^version = .*/version = "${{ steps.ver.outputs.version }}"/' Cargo.toml
          grep '^version' Cargo.toml

      - name: Install Rust + both musl targets
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add x86_64-unknown-linux-musl
          rustup target add aarch64-unknown-linux-musl
          rustc --version

      - name: Install musl + arm64 cross-linker + zip
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu zip

      - name: Configure cargo for arm64 cross-link
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-musl]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build amd64 static binary
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Build arm64 static binary
        run: cargo build --release --target aarch64-unknown-linux-musl

      - name: Verify amd64 binary
        run: |
          file target/x86_64-unknown-linux-musl/release/qvm
          file target/x86_64-unknown-linux-musl/release/qvm | grep -q "static-pie linked\|statically linked"
          target/x86_64-unknown-linux-musl/release/qvm --version | tee /tmp/version.out
          grep -F "${{ steps.ver.outputs.version }}" /tmp/version.out

      - name: Verify arm64 binary is statically linked
        run: |
          file target/aarch64-unknown-linux-musl/release/qvm
          file target/aarch64-unknown-linux-musl/release/qvm | grep -q "static-pie linked\|statically linked"

      - name: Package zips
        run: |
          set -e
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/qvm qvm
          zip -j dist/qvm-linux-amd64-static.zip qvm
          rm qvm
          cp target/aarch64-unknown-linux-musl/release/qvm qvm
          zip -j dist/qvm-linux-arm64-static.zip qvm
          rm qvm
          ls -lh dist/

      - name: Delete every prior release + tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # The "one active release" policy: anything currently published
        # gets removed before the new one goes up. Tag cleanup is best-
        # effort because old tags may be already deleted manually.
        run: |
          set -e
          tags=$(gh release list --limit 100 --json tagName --jq '.[].tagName' || true)
          if [ -z "$tags" ]; then
            echo "No prior releases to delete."
          else
            for tag in $tags; do
              echo "Deleting prior release + tag: $tag"
              gh release delete "$tag" --cleanup-tag --yes || true
            done
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTES:    ${{ inputs.notes }}
          REPO:     ${{ github.repository }}
        run: |
          set -e
          BODY=$(cat <<EOF
qvm ${{ steps.ver.outputs.version }} — Linux amd64 + arm64 (static-musl).

\`\`\`
curl -fsSL https://raw.githubusercontent.com/${REPO}/main/install.sh | sudo sh
\`\`\`
EOF
)
          if [ -n "${NOTES:-}" ]; then
            BODY="$BODY

---

${NOTES}"
          fi
          gh release create "${{ steps.ver.outputs.tag }}" \
            --title "qvm ${{ steps.ver.outputs.version }}" \
            --notes "$BODY" \
            dist/qvm-linux-amd64-static.zip \
            dist/qvm-linux-arm64-static.zip
