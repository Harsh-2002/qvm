name: build

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# `prune` needs actions:write to delete old artifacts; everything else
# is happy with the default read-only token.
permissions:
  contents: read
  actions:  write

jobs:
  test:
    name: test (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        run: |
          rustup toolchain install stable --profile minimal --component clippy
          rustc --version

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: Clippy (strict)
        run: cargo clippy --release --all-targets --locked -- -D warnings

      - name: Cargo test (release)
        run: cargo test --release --locked

  build:
    name: static-${{ matrix.short }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - short:  amd64
            target: x86_64-unknown-linux-musl
            apt:    musl-tools
          - short:  arm64
            target: aarch64-unknown-linux-musl
            apt:    musl-tools gcc-aarch64-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable) + target
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}
          rustc --version

      - name: Install musl + cross-linker
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: Configure cargo for arm64 cross-link
        if: matrix.short == 'arm64'
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-musl]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Cargo build (static, musl, ${{ matrix.short }})
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Verify binary is statically linked
        run: |
          file target/${{ matrix.target }}/release/qvm
          file target/${{ matrix.target }}/release/qvm | grep -q "static-pie linked\|statically linked"
          ldd target/${{ matrix.target }}/release/qvm 2>&1 | grep -qE "not a dynamic executable|statically linked"
          ls -lh target/${{ matrix.target }}/release/qvm

      - name: Smoke test (amd64 only — runner can't exec arm64)
        if: matrix.short == 'amd64'
        run: |
          target/${{ matrix.target }}/release/qvm --version
          target/${{ matrix.target }}/release/qvm --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qvm-linux-${{ matrix.short }}-static
          path: target/${{ matrix.target }}/release/qvm
          if-no-files-found: error
          # Hard cap. The prune job below also keeps only the two
          # newest per name, but this is a backstop in case the prune
          # job is ever skipped (PRs, manual cancellations).
          retention-days: 14

  prune:
    # Keep only the two newest artifacts per name. Without this, every
    # successful push leaves behind two more artifacts (one per arch)
    # for the full retention window, and storage usage drifts up
    # forever. Two-newest gives "current + one rollback step".
    name: prune old artifacts
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Delete all but the 2 newest per artifact name
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          # List every artifact (paginated), group by name, drop the
          # two newest in each group, output the rest's IDs.
          ids="$(gh api -X GET "/repos/${REPO}/actions/artifacts" --paginate \
            --jq '.artifacts
                  | group_by(.name)
                  | map(sort_by(.created_at) | reverse | .[2:])
                  | flatten
                  | .[].id')"
          if [ -z "$ids" ]; then
            echo "Nothing to prune."
            exit 0
          fi
          echo "Pruning $(echo "$ids" | wc -l) old artifact(s)..."
          for id in $ids; do
            echo "  delete artifact $id"
            gh api -X DELETE "/repos/${REPO}/actions/artifacts/${id}" || true
          done
