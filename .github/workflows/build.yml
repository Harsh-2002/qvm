name: build

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: test + static-amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable) + musl target
        run: |
          rustup toolchain install stable --profile minimal --component clippy
          rustup target add x86_64-unknown-linux-musl
          rustc --version

      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: Clippy (strict)
        run: cargo clippy --release --all-targets --locked -- -D warnings

      - name: Cargo test (release)
        run: cargo test --release --locked

      - name: Cargo build (static, musl, amd64)
        run: cargo build --release --locked --target x86_64-unknown-linux-musl

      - name: Verify binary is statically linked
        run: |
          file target/x86_64-unknown-linux-musl/release/qvm
          file target/x86_64-unknown-linux-musl/release/qvm | grep -q "static-pie linked\|statically linked"
          ldd target/x86_64-unknown-linux-musl/release/qvm 2>&1 | grep -qE "not a dynamic executable|statically linked"
          ls -lh target/x86_64-unknown-linux-musl/release/qvm

      - name: Smoke test
        run: |
          target/x86_64-unknown-linux-musl/release/qvm --version
          target/x86_64-unknown-linux-musl/release/qvm --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qvm-linux-amd64-static
          path: target/x86_64-unknown-linux-musl/release/qvm
          if-no-files-found: error
          retention-days: 30
