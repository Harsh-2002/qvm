name: build

# CI for testing only. Artifact uploads were removed; production
# binaries are published through `release.yml` (manual workflow_dispatch)
# which builds both arches, tags a calendar version, and replaces any
# prior GitHub Release. See CLAUDE.md § "Release policy" for the rules.
#
# This workflow still cross-compiles for amd64 *and* arm64 so we catch
# ARM-only build breakage on every push — qvm explicitly supports both.

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        run: |
          rustup toolchain install stable --profile minimal --component clippy
          rustc --version

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: Clippy (strict)
        run: cargo clippy --release --all-targets --locked -- -D warnings

      - name: Cargo test (release)
        run: cargo test --release --locked

  compile-check:
    name: compile-${{ matrix.short }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - short:  amd64
            target: x86_64-unknown-linux-musl
            apt:    musl-tools
          - short:  arm64
            target: aarch64-unknown-linux-musl
            apt:    musl-tools gcc-aarch64-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable) + target
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}
          rustc --version

      - name: Install musl + cross-linker
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: Configure cargo for arm64 cross-link
        if: matrix.short == 'arm64'
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-musl]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Cargo build (static, musl, ${{ matrix.short }})
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Verify binary is statically linked
        run: |
          file target/${{ matrix.target }}/release/qvm
          file target/${{ matrix.target }}/release/qvm | grep -q "static-pie linked\|statically linked"
          ldd target/${{ matrix.target }}/release/qvm 2>&1 | grep -qE "not a dynamic executable|statically linked"
          ls -lh target/${{ matrix.target }}/release/qvm

      - name: Smoke test (amd64 only — runner can't exec arm64)
        if: matrix.short == 'amd64'
        run: |
          target/${{ matrix.target }}/release/qvm --version
          target/${{ matrix.target }}/release/qvm --help
